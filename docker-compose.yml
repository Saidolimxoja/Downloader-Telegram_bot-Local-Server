services:
  # 1. Твой Бот
  nest-bot:
    build: .
    container_name: king-kong-bot
    restart: always
    env_file: .env
    depends_on:
      telegram-api:
        condition: service_started
      tg_bot_redis:
        condition: service_started
    volumes:
      - bot_downloads:/tmp/bot_downloads
    ports:
      - '3000:3000'
    networks:
      - bot-network

  # 2. Локальный Telegram Bot API (для файлов > 50MB)
  telegram-api:
    image: aiogram/telegram-bot-api:latest
    user: root
    container_name: telegram-bot-api
    restart: always
    environment:
      - TELEGRAM_API_ID=${API_ID}
      - TELEGRAM_API_HASH=${API_HASH}
    volumes:
      - telegram-data:/var/lib/telegram-bot-api
      - bot_downloads:/tmp/bot_downloads
    ports:
      - '8081:8081'
    command: --local --verbosity=3 --dir=/var/lib/telegram-bot-api
    networks:
      - bot-network

  # 3. Redis для очередей BullMQ
  tg_bot_redis:
    image: redis:7-alpine
    container_name: tg_bot_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - bot-network

# Описываем тома
volumes:
  telegram-data:
  redis_data:
  bot_downloads:

# Создаем сеть для контейнеров
networks:
  bot-network:
    driver: bridge
